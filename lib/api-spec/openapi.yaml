openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Market Basket Analysis API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Market basket analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analysis/rules:
    get:
      operationId: getAssociationRules
      tags: [analysis]
      summary: Get association rules
      description: Returns all association rules mined from the basket data
      parameters:
        - name: minSupport
          in: query
          schema:
            type: number
            default: 0.1
        - name: minConfidence
          in: query
          schema:
            type: number
            default: 0.5
        - name: topN
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Association rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationRulesResponse"
  /analysis/recommend:
    get:
      operationId: getRecommendations
      tags: [analysis]
      summary: Get product recommendations
      description: Given a product, returns recommended products based on association rules where that product appears in the antecedent
      parameters:
        - name: product
          in: query
          required: true
          schema:
            type: string
        - name: minSupport
          in: query
          schema:
            type: number
            default: 0.05
        - name: minConfidence
          in: query
          schema:
            type: number
            default: 0.2
      responses:
        "200":
          description: Product recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"
  /analysis/stats:
    get:
      operationId: getDataStats
      tags: [analysis]
      summary: Get dataset statistics
      description: Returns statistics about the transaction dataset
      responses:
        "200":
          description: Dataset statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AssociationRule:
      type: object
      properties:
        antecedent:
          type: array
          items:
            type: string
        consequent:
          type: array
          items:
            type: string
        support:
          type: number
        confidence:
          type: number
        lift:
          type: number
        conviction:
          type: number
        antecedentSupport:
          type: number
        consequentSupport:
          type: number
      required:
        - antecedent
        - consequent
        - support
        - confidence
        - lift
        - conviction
        - antecedentSupport
        - consequentSupport
    AssociationRulesResponse:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/AssociationRule"
        top3:
          type: array
          items:
            $ref: "#/components/schemas/AssociationRule"
        totalRules:
          type: integer
        parameters:
          type: object
          properties:
            minSupport:
              type: number
            minConfidence:
              type: number
          required:
            - minSupport
            - minConfidence
      required:
        - rules
        - top3
        - totalRules
        - parameters
    ItemFrequency:
      type: object
      properties:
        item:
          type: string
        count:
          type: integer
        support:
          type: number
      required:
        - item
        - count
        - support
    RecommendedProduct:
      type: object
      properties:
        product:
          type: string
        confidence:
          type: number
        lift:
          type: number
        support:
          type: number
        triggeringRules:
          type: integer
      required:
        - product
        - confidence
        - lift
        - support
        - triggeringRules
    RecommendationResponse:
      type: object
      properties:
        product:
          type: string
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/RecommendedProduct"
        rulesUsed:
          type: integer
        allItems:
          type: array
          items:
            type: string
      required:
        - product
        - recommendations
        - rulesUsed
        - allItems
    DataStats:
      type: object
      properties:
        totalTransactions:
          type: integer
        totalItems:
          type: integer
        itemFrequencies:
          type: array
          items:
            $ref: "#/components/schemas/ItemFrequency"
        avgItemsPerTransaction:
          type: number
      required:
        - totalTransactions
        - totalItems
        - itemFrequencies
        - avgItemsPerTransaction
