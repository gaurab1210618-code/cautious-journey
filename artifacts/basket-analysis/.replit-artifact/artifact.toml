kind = "web"
previewPath = "/"
title = "Market Basket Analysis"
version = "1.0.0"
id = "artifacts/basket-analysis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21151
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/basket-analysis run dev"

[services.env]
PORT = "21151"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/basket-analysis", "run", "build"]
publicDir = "artifacts/basket-analysis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
